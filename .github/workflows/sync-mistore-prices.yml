name: Sync mistore prices

on:
  schedule:
    # 03:00 и 15:00 UTC = 06:00 и 18:00 MSK (дважды в сутки)
    - cron: "0 3,15 * * *"
  # Возможность ручного запуска из вкладки Actions
  workflow_dispatch:

permissions:
  contents: write   # для авто-коммита lib/tg-prices.ts

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        id: sync
        run: |
          python3 scripts/fetch-mistore-prices.py > sync-report.txt 2>&1
          cat sync-report.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet lib/tg-prices.ts lib/tg-sync-meta.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Цены не изменились."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Краткая сводка для коммита и Telegram
            python3 - <<'PY' > diff-summary.txt
          import re, subprocess
          out = subprocess.run(
              ["git", "diff", "--unified=0", "lib/tg-prices.ts"],
              capture_output=True, text=True,
          ).stdout
          added   = re.findall(r'^\+\s*"([^"]+)":\s*(\d+)', out, re.M)
          removed = re.findall(r'^-\s*"([^"]+)":\s*(\d+)', out, re.M)
          # Парные строки = изменения; остальное = чистые add/remove
          added_d   = dict(added)
          removed_d = dict(removed)
          changed   = [k for k in added_d if k in removed_d]
          new       = [k for k in added_d if k not in removed_d]
          gone      = [k for k in removed_d if k not in added_d]

          lines = []
          if changed:
              lines.append(f"~ Изменено: {len(changed)}")
              for k in changed[:8]:
                  old = int(removed_d[k]); new_p = int(added_d[k])
                  lines.append(f"  • {k}: {old:,}→{new_p:,}₽ ({new_p-old:+,})")
              if len(changed) > 8:
                  lines.append(f"  … и ещё {len(changed)-8}")
          if new:
              lines.append(f"+ Новых: {len(new)}")
              for k in new[:5]:
                  lines.append(f"  • {k}: {int(added_d[k]):,}₽")
              if len(new) > 5:
                  lines.append(f"  … и ещё {len(new)-5}")
          if gone:
              lines.append(f"- Убрано: {len(gone)}")
              for k in gone[:5]:
                  lines.append(f"  • {k} (был {int(removed_d[k]):,}₽)")

          print("\n".join(lines) or "Изменений в наценках нет.")
          PY
            cat diff-summary.txt
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "mistore-sync-bot"
          git config user.email "noreply@finnice.ru"
          git add lib/tg-prices.ts lib/tg-sync-meta.json
          {
            echo "chore(prices): sync from TG channels"
            echo
            cat diff-summary.txt
          } | git commit -F -
          # Длинный прогон (TG + biggeek = ~50 сек) даёт окно для конкурентного
          # коммита в main → push фейлится с «fetch first». Тянем последний main
          # и реблоим наш sync-коммит поверх, до 5 попыток на случай повторных
          # гонок. --autostash не нужен — рабочая копия чистая после commit.
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main || exit 1
            if git push; then
              echo "✓ Pushed on attempt $attempt"
              exit 0
            fi
            echo "⚠️  Push rejected (attempt $attempt) — retrying after rebase"
            sleep 2
          done
          echo "✗ Push failed after 5 attempts"
          exit 1

      - name: Notify Telegram (success with changes)
        if: steps.diff.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SUMMARY=$(cat diff-summary.txt)
          MESSAGE=$(printf "🔄 *Цены mistore синхронизированы*\n\n\`\`\`\n%s\n\`\`\`\n[Run #${{ github.run_number }}](%s) · автодеплой Vercel запущен" "$SUMMARY" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram (failure)
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MESSAGE=$(printf "⚠️ *Sync mistore упал*\n[Run #${{ github.run_number }}](%s) — проверь логи" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MESSAGE}" || true
