name: Sync mistore prices

on:
  schedule:
    # 03:00 UTC = 06:00 MSK –µ–ґ–µ–і–љ–µ–≤–љ–Њ
    - cron: "0 3 * * *"
  # –Т–Њ–Ј–Љ–Њ–ґ–љ–Њ—Б—В—М —А—Г—З–љ–Њ–≥–Њ –Ј–∞–њ—Г—Б–Ї–∞ –Є–Ј –≤–Ї–ї–∞–і–Ї–Є Actions
  workflow_dispatch:

permissions:
  contents: write   # –і–ї—П –∞–≤—В–Њ-–Ї–Њ–Љ–Љ–Є—В–∞ lib/tg-prices.ts

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        id: sync
        run: |
          python3 scripts/fetch-mistore-prices.py > sync-report.txt 2>&1
          cat sync-report.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet lib/tg-prices.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "–¶–µ–љ—Л –љ–µ –Є–Ј–Љ–µ–љ–Є–ї–Є—Б—М."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # –Ъ—А–∞—В–Ї–∞—П —Б–≤–Њ–і–Ї–∞ –і–ї—П –Ї–Њ–Љ–Љ–Є—В–∞ –Є Telegram
            python3 - <<'PY' > diff-summary.txt
          import re, subprocess
          out = subprocess.run(
              ["git", "diff", "--unified=0", "lib/tg-prices.ts"],
              capture_output=True, text=True,
          ).stdout
          added   = re.findall(r'^\+\s*"([^"]+)":\s*(\d+)', out, re.M)
          removed = re.findall(r'^-\s*"([^"]+)":\s*(\d+)', out, re.M)
          # –Я–∞—А–љ—Л–µ —Б—В—А–Њ–Ї–Є = –Є–Ј–Љ–µ–љ–µ–љ–Є—П; –Њ—Б—В–∞–ї—М–љ–Њ–µ = —З–Є—Б—В—Л–µ add/remove
          added_d   = dict(added)
          removed_d = dict(removed)
          changed   = [k for k in added_d if k in removed_d]
          new       = [k for k in added_d if k not in removed_d]
          gone      = [k for k in removed_d if k not in added_d]

          lines = []
          if changed:
              lines.append(f"~ –Ш–Ј–Љ–µ–љ–µ–љ–Њ: {len(changed)}")
              for k in changed[:8]:
                  old = int(removed_d[k]); new_p = int(added_d[k])
                  lines.append(f"  вАҐ {k}: {old:,}вЖТ{new_p:,}вВљ ({new_p-old:+,})")
              if len(changed) > 8:
                  lines.append(f"  вА¶ –Є –µ—Й—С {len(changed)-8}")
          if new:
              lines.append(f"+ –Э–Њ–≤—Л—Е: {len(new)}")
              for k in new[:5]:
                  lines.append(f"  вАҐ {k}: {int(added_d[k]):,}вВљ")
              if len(new) > 5:
                  lines.append(f"  вА¶ –Є –µ—Й—С {len(new)-5}")
          if gone:
              lines.append(f"- –£–±—А–∞–љ–Њ: {len(gone)}")
              for k in gone[:5]:
                  lines.append(f"  вАҐ {k} (–±—Л–ї {int(removed_d[k]):,}вВљ)")

          print("\n".join(lines) or "–Ш–Ј–Љ–µ–љ–µ–љ–Є–є –≤ –љ–∞—Ж–µ–љ–Ї–∞—Е –љ–µ—В.")
          PY
            cat diff-summary.txt
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "mistore-sync-bot"
          git config user.email "noreply@finnice.ru"
          git add lib/tg-prices.ts
          {
            echo "chore(prices): sync from @mistore095"
            echo
            cat diff-summary.txt
          } | git commit -F -
          git push

      - name: Notify Telegram (success with changes)
        if: steps.diff.outputs.changed == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SUMMARY=$(cat diff-summary.txt)
          MESSAGE=$(printf "рЯФД *–¶–µ–љ—Л mistore —Б–Є–љ—Е—А–Њ–љ–Є–Ј–Є—А–Њ–≤–∞–љ—Л*\n\n\`\`\`\n%s\n\`\`\`\n[Run #${{ github.run_number }}](%s) ¬Ј –∞–≤—В–Њ–і–µ–њ–ї–Њ–є Vercel –Ј–∞–њ—Г—Й–µ–љ" "$SUMMARY" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram (failure)
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MESSAGE=$(printf "вЪ†пЄП *Sync mistore —Г–њ–∞–ї*\n[Run #${{ github.run_number }}](%s) вАФ –њ—А–Њ–≤–µ—А—М –ї–Њ–≥–Є" "$RUN_URL")
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MESSAGE}" || true
